<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — L'Étoile du Liban</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f9f6f1; --card:#fcfbf8; --text:#1f251e; --muted:#5e6354;
  --gold:#8b744b; --gold-soft:rgba(139,116,75,0.3); --gold-pale:rgba(139,116,75,0.12);
  --border:#d9d4c9; --cream:#f9f6f1;
}
body{font-family:'Inter',ui-sans-serif,system-ui,sans-serif;background:var(--bg);color:var(--text);}
h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:300;letter-spacing:-0.02em;}
.wrap{max-width:1100px;margin:0 auto;padding:2rem;}
header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;}
.logo{font-size:1.5rem;}
.logo-sub{display:block;font-family:'Inter',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;margin-top:.15rem;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:0 1.5rem;height:42px;border-radius:9999px;font-size:.85rem;font-weight:500;text-decoration:none;cursor:pointer;border:1px solid var(--gold);background:var(--gold);color:var(--cream);transition:background .2s;}
.btn:hover{background:#796340;}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--gold-soft);}
.btn-outline:hover{border-color:var(--gold);background:none;}
.btn-danger{border-color:#a33;background:#a33;}
.btn-danger:hover{background:#8a2a2a;}
.btn-sm{height:34px;padding:0 1rem;font-size:.78rem;}

.panel{background:var(--card);border:1px solid var(--border);border-radius:1.5rem;padding:1.75rem;margin-bottom:2rem;}
.panel h2{font-size:1.6rem;margin-bottom:1.25rem;}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;}
.form-grid .full{grid-column:1/-1;}
label{display:block;font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
input,textarea{width:100%;padding:.7rem .9rem;border:1px solid var(--border);border-radius:.65rem;font-size:.95rem;font-family:'Inter',sans-serif;background:#fff;}
input:focus,textarea:focus{outline:none;border-color:var(--gold);}
textarea{resize:vertical;min-height:70px;}
.field{margin-bottom:1rem;}
.form-actions{display:flex;gap:.75rem;margin-top:.5rem;}
.preview{width:120px;height:90px;object-fit:cover;border-radius:.65rem;border:1px solid var(--border);margin-top:.5rem;display:none;}

.category-group{margin-bottom:1.5rem;}
.category-group h3{font-size:1.25rem;color:var(--gold);margin-bottom:.75rem;}
.product-row{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1rem 1.25rem;margin-bottom:.6rem;}
.product-row .info{display:flex;align-items:center;gap:1rem;}
.product-row img{width:56px;height:56px;object-fit:cover;border-radius:.5rem;background:var(--gold-pale);}
.product-row .meta{font-size:.8rem;color:var(--muted);}
.product-row .meta strong{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--text);display:block;}
.actions{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
.price-edit{display:flex;align-items:center;gap:.35rem;}
.price-prefix{color:var(--muted);font-size:.85rem;}
.price-input{width:90px;padding:.45rem .6rem;font-size:.85rem;}
.stock-input{width:70px;padding:.45rem .6rem;font-size:.85rem;}
.status{font-size:.85rem;color:var(--muted);margin-bottom:1rem;}
.status.error{color:#a33;}

.category-edit{border:1px solid var(--border);border-radius:1rem;padding:1.25rem;margin-bottom:1rem;}
.category-edit h3{font-size:1.25rem;color:var(--gold);margin-bottom:.75rem;}
.category-edit .cat-status{display:none;margin:0;}
.category-edit .form-actions{align-items:center;}

.order-item-row{font-size:.85rem;color:var(--text);padding:.15rem 0;}
.order-meta{font-size:.85rem;color:var(--muted);margin-bottom:.75rem;}
.order-address{font-size:.85rem;color:var(--muted);margin:.75rem 0;}
.status-badge{font-size:.62rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:.35rem .8rem;border-radius:9999px;background:var(--gold-pale);color:var(--gold);border:1px solid var(--gold-soft);margin-left:.5rem;}
.order-status-select{width:auto;padding:.45rem .6rem;font-size:.85rem;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="logo">L'Étoile du Liban
        <span class="logo-sub">Admin Panel</span>
      </div>
    </div>
    <button class="btn btn-outline" id="logout-btn">Log Out</button>
  </header>

  <div class="panel">
    <h2 id="form-title">Add Product</h2>
    <p class="status error" id="form-status" style="display:none;"></p>
    <form id="product-form">
      <input type="hidden" id="product-id">
      <div class="form-grid">
        <div class="field"><label for="name">Name</label><input id="name" required></div>
        <div class="field"><label for="price">Price (USD)</label><input id="price" type="number" step="0.01" min="0"></div>
        <div class="field"><label for="stock_quantity">Stock Quantity</label><input id="stock_quantity" type="number" step="1" min="0" value="0"></div>
        <div class="field full"><label for="description">Description</label><textarea id="description" required></textarea></div>
        <div class="field"><label for="category">Category</label><input id="category" required></div>
        <div class="field"><label for="sort_order">Sort Order</label><input id="sort_order" type="number" step="1" value="0"></div>
        <div class="field"><label for="category_eyebrow">Category Eyebrow (small label)</label><input id="category_eyebrow"></div>
        <div class="field"><label for="category_description">Category Description</label><input id="category_description"></div>
        <div class="field"><label for="size">Size</label><input id="size" placeholder="e.g. 140G or 100ML"></div>
        <div class="field"><label for="product_tag">Product Tag</label><input id="product_tag" placeholder="e.g. Olive Leaf"></div>
        <div class="field full"><label for="ritual_tags">Ritual Tags (comma-separated)</label><input id="ritual_tags" placeholder="purify, exfoliate, perfume, restore, nourish, strengthen"></div>
        <div class="field full"><label for="ritual_detail">Ritual Detail</label><textarea id="ritual_detail"></textarea></div>
        <div class="field full">
          <label for="image_file">Product Image</label>
          <input type="file" id="image_file" accept="image/jpeg,image/png,image/webp,image/gif">
          <input type="hidden" id="image_url">
          <img class="preview" id="image_preview" alt="Preview">
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn" id="save-btn">Add Product</button>
        <button type="button" class="btn btn-outline" id="cancel-btn" style="display:none;">Cancel</button>
      </div>
    </form>
  </div>

  <div class="panel">
    <h2>Catalog</h2>
    <p class="status" id="list-status">Loading…</p>
    <div id="product-list"></div>
  </div>

  <div class="panel">
    <h2>Collection Categories</h2>
    <p class="status" id="categories-status">Loading…</p>
    <div id="categories-list"></div>
  </div>

  <div class="panel">
    <h2>Site Images</h2>
    <p class="status" id="site-images-status">Loading…</p>
    <div id="site-images-list"></div>
  </div>

  <div class="panel">
    <h2>Site Content</h2>
    <p class="status" id="site-content-status">Loading…</p>
    <div id="site-content-list"></div>
  </div>

  <div class="panel">
    <h2>Contact Section</h2>
    <p class="status" id="cta-content-status">Loading…</p>
    <div id="cta-content-list"></div>
  </div>

  <div class="panel">
    <h2>Orders</h2>
    <p class="status" id="orders-status">Loading…</p>
    <div id="orders-list"></div>
  </div>

  <div class="panel">
    <h2>Shipping Settings</h2>
    <p class="status" id="shipping-status">Loading…</p>
    <div class="form-grid" id="shipping-form" style="display:none;">
      <div class="field">
        <label for="shipping-rate-input">Flat Rate Shipping (USD)</label>
        <input id="shipping-rate-input" type="number" step="0.01" min="0" placeholder="0.00">
      </div>
      <div class="field" style="align-self:end;">
        <button type="button" class="btn btn-sm" id="shipping-save">Save</button>
        <p class="status cat-status" id="shipping-save-status"></p>
      </div>
    </div>
  </div>
</div>

<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var form = document.getElementById('product-form');
  var formTitle = document.getElementById('form-title');
  var formStatus = document.getElementById('form-status');
  var saveBtn = document.getElementById('save-btn');
  var cancelBtn = document.getElementById('cancel-btn');
  var listStatus = document.getElementById('list-status');
  var productList = document.getElementById('product-list');
  var imageFile = document.getElementById('image_file');
  var imagePreview = document.getElementById('image_preview');

  var FIELDS = ['name','description','price','category','category_eyebrow','category_description','size','product_tag','ritual_detail','sort_order','stock_quantity'];

  function esc(str){
    return String(str == null ? '' : str).replace(/[&<>"']/g, function(c){
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  function showStatus(msg, isError){
    formStatus.textContent = msg;
    formStatus.className = 'status' + (isError ? ' error' : '');
    formStatus.style.display = msg ? 'block' : 'none';
  }

  function resetForm(){
    form.reset();
    document.getElementById('product-id').value = '';
    document.getElementById('image_url').value = '';
    document.getElementById('sort_order').value = '0';
    document.getElementById('stock_quantity').value = '0';
    imagePreview.style.display = 'none';
    formTitle.textContent = 'Add Product';
    saveBtn.textContent = 'Add Product';
    cancelBtn.style.display = 'none';
    showStatus('');
  }

  function fillForm(p){
    document.getElementById('product-id').value = p.id;
    document.getElementById('name').value = p.name || '';
    document.getElementById('description').value = p.description || '';
    document.getElementById('price').value = p.price != null ? p.price : '';
    document.getElementById('category').value = p.category || '';
    document.getElementById('category_eyebrow').value = p.category_eyebrow || '';
    document.getElementById('category_description').value = p.category_description || '';
    document.getElementById('size').value = p.size || '';
    document.getElementById('product_tag').value = p.product_tag || '';
    document.getElementById('ritual_tags').value = (p.ritual_tags || []).join(', ');
    document.getElementById('ritual_detail').value = p.ritual_detail || '';
    document.getElementById('sort_order').value = p.sort_order != null ? p.sort_order : 0;
    document.getElementById('stock_quantity').value = p.stock_quantity != null ? p.stock_quantity : 0;
    document.getElementById('image_url').value = p.image_url || '';
    if (p.image_url){
      imagePreview.src = p.image_url;
      imagePreview.style.display = 'block';
    } else {
      imagePreview.style.display = 'none';
    }
    formTitle.textContent = 'Edit Product';
    saveBtn.textContent = 'Save Changes';
    cancelBtn.style.display = 'inline-flex';
    showStatus('');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  cancelBtn.addEventListener('click', resetForm);

  imageFile.addEventListener('change', async function(){
    var file = imageFile.files[0];
    if (!file) return;
    showStatus('Uploading image…');
    try {
      var dataUrl = await new Promise(function(resolve, reject){
        var reader = new FileReader();
        reader.onload = function(){ resolve(reader.result); };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      var base64 = dataUrl.split(',')[1];
      var res = await fetch('/api/upload-image', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ contentType: file.type, dataBase64: base64 })
      });
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Upload failed');
      document.getElementById('image_url').value = data.url;
      imagePreview.src = data.url;
      imagePreview.style.display = 'block';
      showStatus('');
    } catch (err){
      showStatus(err.message, true);
    }
  });

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    var id = document.getElementById('product-id').value;
    var payload = {};
    FIELDS.forEach(function(f){
      var el = document.getElementById(f);
      var val = el.value;
      if (f === 'price' || f === 'sort_order' || f === 'stock_quantity'){
        payload[f] = val === '' ? null : Number(val);
      } else {
        payload[f] = val;
      }
    });
    payload.ritual_tags = document.getElementById('ritual_tags').value
      .split(',').map(function(s){ return s.trim(); }).filter(Boolean);
    payload.image_url = document.getElementById('image_url').value || null;

    saveBtn.disabled = true;
    showStatus(id ? 'Saving…' : 'Adding…');
    try {
      if (id) payload.id = id;
      var res = await fetch('/api/products', {
        method: id ? 'PUT' : 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(payload)
      });
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || data.message || 'Save failed');
      resetForm();
      loadProducts();
    } catch (err){
      showStatus(err.message, true);
    } finally {
      saveBtn.disabled = false;
    }
  });

  window.editProduct = function(id){
    var p = window.__products.find(function(x){ return x.id === id; });
    if (p) fillForm(p);
  };

  window.deleteProduct = async function(id, name){
    if (!confirm('Delete "' + name + '"? This cannot be undone.')) return;
    try {
      var res = await fetch('/api/products', {
        method: 'DELETE',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ id: id })
      });
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Delete failed');
      loadProducts();
    } catch (err){
      alert(err.message);
    }
  };

  function productRowHtml(p){
    var img = p.image_url
      ? '<img src="' + esc(p.image_url) + '" alt="">'
      : '<div style="width:56px;height:56px;border-radius:.5rem;background:var(--gold-pale);"></div>';
    var priceVal = (p.price !== null && p.price !== undefined) ? Number(p.price).toFixed(2) : '';
    var stockVal = p.stock_quantity != null ? p.stock_quantity : 0;
    return '' +
      '<div class="product-row" data-id="' + p.id + '">' +
        '<div class="info">' + img +
          '<div class="meta"><strong>' + esc(p.name) + '</strong>' + esc(p.size || '') + '</div>' +
        '</div>' +
        '<div class="actions">' +
          '<div class="price-edit">' +
            '<span class="price-prefix">$</span>' +
            '<input type="number" step="0.01" min="0" class="price-input" value="' + priceVal + '" placeholder="0.00">' +
            '<button class="btn btn-outline btn-sm price-save">Save</button>' +
          '</div>' +
          '<div class="price-edit">' +
            '<span class="price-prefix">Stock</span>' +
            '<input type="number" step="1" min="0" class="stock-input" value="' + stockVal + '" placeholder="0">' +
            '<button class="btn btn-outline btn-sm stock-save">Save</button>' +
          '</div>' +
          '<button class="btn btn-outline btn-sm" onclick="editProduct(\'' + p.id + '\')">Edit</button>' +
          '<button class="btn btn-danger btn-sm" onclick="deleteProduct(\'' + p.id + '\', ' + JSON.stringify(p.name).replace(/"/g, '&quot;') + ')">Delete</button>' +
        '</div>' +
      '</div>';
  }

  function renderList(products){
    window.__products = products;
    if (!products.length){
      listStatus.textContent = 'No products yet.';
      listStatus.style.display = 'block';
      productList.innerHTML = '';
      return;
    }
    listStatus.style.display = 'none';
    var order = [];
    var byCategory = {};
    products.forEach(function(p){
      var key = p.category || 'Uncategorized';
      if (!byCategory[key]){ byCategory[key] = []; order.push(key); }
      byCategory[key].push(p);
    });
    productList.innerHTML = order.map(function(cat){
      return '<div class="category-group"><h3>' + esc(cat) + '</h3>' +
        byCategory[cat].map(productRowHtml).join('') + '</div>';
    }).join('');
  }

  var client;
  function loadProducts(){
    client.from('products').select('*').order('sort_order', { ascending: true }).then(function(res){
      if (res.error){
        listStatus.textContent = 'Unable to load products.';
        listStatus.className = 'status error';
        listStatus.style.display = 'block';
        return;
      }
      renderList(res.data || []);
    });
  }

  productList.addEventListener('click', async function(e){
    var isPrice = e.target.classList.contains('price-save');
    var isStock = e.target.classList.contains('stock-save');
    if (!isPrice && !isStock) return;
    var row = e.target.closest('.product-row');
    var id = row.getAttribute('data-id');
    var payload = { id: id };
    if (isPrice){
      var priceInput = row.querySelector('.price-input');
      payload.price = priceInput.value === '' ? null : Number(priceInput.value);
    } else {
      var stockInput = row.querySelector('.stock-input');
      payload.stock_quantity = stockInput.value === '' ? 0 : Number(stockInput.value);
    }
    e.target.disabled = true;
    var original = e.target.textContent;
    e.target.textContent = 'Saving…';
    try {
      var res = await fetch('/api/products', {
        method: 'PUT',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(payload)
      });
      var data = await res.json();
      if (!res.ok) throw new Error((data && (data.error || data.message)) || 'Save failed');
      var product = (window.__products || []).find(function(x){ return x.id === id; });
      if (product){
        if (isPrice) product.price = payload.price;
        else product.stock_quantity = payload.stock_quantity;
      }
      e.target.textContent = 'Saved';
      setTimeout(function(){ e.target.textContent = original; }, 1200);
    } catch (err){
      alert(err.message);
      e.target.textContent = original;
    } finally {
      e.target.disabled = false;
    }
  });

  document.getElementById('logout-btn').addEventListener('click', async function(){
    await fetch('/api/admin-logout', { method: 'POST' });
    window.location.href = '/admin/login.html';
  });

  // ---- Collection Categories ----
  var categoriesStatus = document.getElementById('categories-status');
  var categoriesList = document.getElementById('categories-list');

  function categoryFormHtml(cat){
    var hasImage = !!cat.image_url;
    return '' +
      '<div class="category-edit" data-id="' + cat.id + '">' +
        '<h3>' + esc(cat.name) + '</h3>' +
        '<div class="form-grid">' +
          '<div class="field"><label>Name</label><input class="cat-name" value="' + esc(cat.name) + '"></div>' +
          '<div class="field"><label>Sort Order</label><input class="cat-sort" type="number" step="1" value="' + (cat.sort_order != null ? cat.sort_order : 0) + '"></div>' +
          '<div class="field full"><label>Description</label><textarea class="cat-description">' + esc(cat.description || '') + '</textarea></div>' +
          '<div class="field full">' +
            '<label>Category Image</label>' +
            '<input type="file" class="cat-image-file" accept="image/jpeg,image/png,image/webp,image/gif">' +
            '<input type="hidden" class="cat-image-url" value="' + esc(cat.image_url || '') + '">' +
            '<img class="preview cat-image-preview" src="' + esc(cat.image_url || '') + '" style="' + (hasImage ? 'display:block;' : 'display:none;') + '">' +
          '</div>' +
        '</div>' +
        '<div class="form-actions">' +
          '<button type="button" class="btn btn-sm cat-save">Save</button>' +
          '<p class="status cat-status"></p>' +
        '</div>' +
      '</div>';
  }

  function renderCategories(categories){
    if (!categories.length){
      categoriesStatus.textContent = 'No categories found.';
      categoriesStatus.style.display = 'block';
      categoriesList.innerHTML = '';
      return;
    }
    categoriesStatus.style.display = 'none';
    var sorted = categories.slice().sort(function(a, b){ return (a.sort_order || 0) - (b.sort_order || 0); });
    categoriesList.innerHTML = sorted.map(categoryFormHtml).join('');
  }

  function loadCategories(){
    client.from('categories').select('*').then(function(res){
      if (res.error){
        categoriesStatus.textContent = 'Categories table not set up yet. Run supabase/categories.sql in the Supabase SQL editor.';
        categoriesStatus.className = 'status error';
        categoriesStatus.style.display = 'block';
        categoriesList.innerHTML = '';
        return;
      }
      renderCategories(res.data || []);
    });
  }

  categoriesList.addEventListener('change', async function(e){
    if (!e.target.classList.contains('cat-image-file')) return;
    var card = e.target.closest('.category-edit');
    var file = e.target.files[0];
    if (!file) return;
    var statusEl = card.querySelector('.cat-status');
    statusEl.className = 'status cat-status';
    statusEl.style.display = 'block';
    statusEl.textContent = 'Uploading image…';
    try {
      var dataUrl = await new Promise(function(resolve, reject){
        var reader = new FileReader();
        reader.onload = function(){ resolve(reader.result); };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      var base64 = dataUrl.split(',')[1];
      var res = await fetch('/api/upload-image', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ contentType: file.type, dataBase64: base64 })
      });
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Upload failed');
      card.querySelector('.cat-image-url').value = data.url;
      var preview = card.querySelector('.cat-image-preview');
      preview.src = data.url;
      preview.style.display = 'block';
      statusEl.style.display = 'none';
    } catch (err){
      statusEl.className = 'status cat-status error';
      statusEl.textContent = err.message;
    }
  });

  categoriesList.addEventListener('click', async function(e){
    if (!e.target.classList.contains('cat-save')) return;
    var card = e.target.closest('.category-edit');
    var statusEl = card.querySelector('.cat-status');
    var payload = {
      id: card.getAttribute('data-id'),
      name: card.querySelector('.cat-name').value,
      description: card.querySelector('.cat-description').value,
      sort_order: Number(card.querySelector('.cat-sort').value) || 0,
      image_url: card.querySelector('.cat-image-url').value || null
    };
    e.target.disabled = true;
    statusEl.className = 'status cat-status';
    statusEl.style.display = 'block';
    statusEl.textContent = 'Saving…';
    try {
      var res = await fetch('/api/categories', {
        method: 'PUT',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(payload)
      });
      var data = await res.json();
      if (!res.ok) throw new Error((data && (data.error || data.message)) || 'Save failed');
      card.querySelector('h3').textContent = payload.name;
      statusEl.textContent = 'Saved.';
      setTimeout(function(){ statusEl.style.display = 'none'; }, 1500);
    } catch (err){
      statusEl.className = 'status cat-status error';
      statusEl.textContent = err.message;
    } finally {
      e.target.disabled = false;
    }
  });

  // ---- Site Images ----
  var siteImagesStatus = document.getElementById('site-images-status');
  var siteImagesList = document.getElementById('site-images-list');

  var SITE_IMAGE_LABELS = {
    hero_image: 'Hero Section Image ("600 Years" badge, right side of hero)',
    story_image: 'Story Section Image ("Born in Tripoli\'s ancient souks")'
  };

  function siteImageHtml(setting){
    var hasImage = !!setting.image_url;
    return '' +
      '<div class="category-edit" data-key="' + esc(setting.key) + '">' +
        '<h3>' + esc(SITE_IMAGE_LABELS[setting.key] || setting.key) + '</h3>' +
        '<div class="form-grid">' +
          '<div class="field full">' +
            '<label>Image</label>' +
            '<input type="file" class="site-image-file" accept="image/jpeg,image/png,image/webp,image/gif">' +
            '<input type="hidden" class="site-image-url" value="' + esc(setting.image_url || '') + '">' +
            '<img class="preview site-image-preview" src="' + esc(setting.image_url || '') + '" style="' + (hasImage ? 'display:block;' : 'display:none;') + '">' +
          '</div>' +
        '</div>' +
        '<div class="form-actions">' +
          '<button type="button" class="btn btn-sm site-image-save">Save</button>' +
          '<p class="status cat-status"></p>' +
        '</div>' +
      '</div>';
  }

  function renderSiteImages(settings){
    if (!settings.length){
      siteImagesStatus.textContent = 'No site images configured.';
      siteImagesStatus.style.display = 'block';
      siteImagesList.innerHTML = '';
      return;
    }
    siteImagesStatus.style.display = 'none';
    var order = ['hero_image', 'story_image'];
    var byKey = {};
    settings.forEach(function(s){ byKey[s.key] = s; });
    siteImagesList.innerHTML = order.filter(function(k){ return byKey[k]; })
      .map(function(k){ return siteImageHtml(byKey[k]); }).join('');
  }

  function loadSiteImages(){
    client.from('site_settings').select('*').then(function(res){
      if (res.error){
        siteImagesStatus.textContent = 'Site images table not set up yet. Run supabase/site_settings.sql in the Supabase SQL editor.';
        siteImagesStatus.className = 'status error';
        siteImagesStatus.style.display = 'block';
        siteImagesList.innerHTML = '';
        return;
      }
      renderSiteImages(res.data || []);
    });
  }

  siteImagesList.addEventListener('change', async function(e){
    if (!e.target.classList.contains('site-image-file')) return;
    var card = e.target.closest('.category-edit');
    var file = e.target.files[0];
    if (!file) return;
    var statusEl = card.querySelector('.cat-status');
    statusEl.className = 'status cat-status';
    statusEl.style.display = 'block';
    statusEl.textContent = 'Uploading image…';
    try {
      var dataUrl = await new Promise(function(resolve, reject){
        var reader = new FileReader();
        reader.onload = function(){ resolve(reader.result); };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      var base64 = dataUrl.split(',')[1];
      var res = await fetch('/api/upload-image', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ contentType: file.type, dataBase64: base64 })
      });
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Upload failed');
      card.querySelector('.site-image-url').value = data.url;
      var preview = card.querySelector('.site-image-preview');
      preview.src = data.url;
      preview.style.display = 'block';
      statusEl.style.display = 'none';
    } catch (err){
      statusEl.className = 'status cat-status error';
      statusEl.textContent = err.message;
    }
  });

  siteImagesList.addEventListener('click', async function(e){
    if (!e.target.classList.contains('site-image-save')) return;
    var card = e.target.closest('.category-edit');
    var statusEl = card.querySelector('.cat-status');
    var payload = {
      key: card.getAttribute('data-key'),
      image_url: card.querySelector('.site-image-url').value || null
    };
    e.target.disabled = true;
    statusEl.className = 'status cat-status';
    statusEl.style.display = 'block';
    statusEl.textContent = 'Saving…';
    try {
      var res = await fetch('/api/site-settings', {
        method: 'PUT',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(payload)
      });
      var data = await res.json();
      if (!res.ok) throw new Error((data && (data.error || data.message)) || 'Save failed');
      statusEl.textContent = 'Saved.';
      setTimeout(function(){ statusEl.style.display = 'none'; }, 1500);
    } catch (err){
      statusEl.className = 'status cat-status error';
      statusEl.textContent = err.message;
    } finally {
      e.target.disabled = false;
    }
  });

  // ---- Site Content (text settings, shared by Site Content + Contact Section) ----
  var SITE_CONTENT_FIELDS = {
    hero_headline: { label: 'Hero Headline', type: 'input' },
    hero_description: { label: 'Hero Description', type: 'textarea' },
    story_headline: { label: 'Story Headline', type: 'input' },
    story_description: { label: 'Story Description', type: 'textarea' }
  };
  var SITE_CONTENT_ORDER = ['hero_headline', 'hero_description', 'story_headline', 'story_description'];

  var CTA_CONTENT_FIELDS = {
    cta_headline: { label: 'Headline', type: 'input' },
    cta_description: { label: 'Description', type: 'textarea' },
    cta_email: { label: 'Email Address', type: 'input' },
    cta_phone: { label: 'Phone Number', type: 'input' }
  };
  var CTA_CONTENT_ORDER = ['cta_headline', 'cta_description', 'cta_email', 'cta_phone'];

  function textSettingHtml(setting, fieldsMap){
    var field = fieldsMap[setting.key] || { label: setting.key, type: 'textarea' };
    var value = esc(setting.text_value || '');
    var control = field.type === 'textarea'
      ? '<textarea class="site-content-value">' + value + '</textarea>'
      : '<input class="site-content-value" value="' + value + '">';
    return '' +
      '<div class="category-edit" data-key="' + esc(setting.key) + '">' +
        '<h3>' + esc(field.label) + '</h3>' +
        '<div class="form-grid">' +
          '<div class="field full"><label>Text</label>' + control + '</div>' +
        '</div>' +
        '<div class="form-actions">' +
          '<button type="button" class="btn btn-sm site-content-save">Save</button>' +
          '<p class="status cat-status"></p>' +
        '</div>' +
      '</div>';
  }

  function renderTextSettings(settings, fieldsMap, order, listEl, statusEl, emptyMsg){
    if (!settings.length){
      statusEl.textContent = emptyMsg;
      statusEl.style.display = 'block';
      listEl.innerHTML = '';
      return;
    }
    statusEl.style.display = 'none';
    var byKey = {};
    settings.forEach(function(s){ byKey[s.key] = s; });
    listEl.innerHTML = order.filter(function(k){ return byKey[k]; })
      .map(function(k){ return textSettingHtml(byKey[k], fieldsMap); }).join('');
  }

  function loadTextSettings(fieldsMap, order, listEl, statusEl, emptyMsg, errorMsg){
    client.from('site_settings').select('*').then(function(res){
      if (res.error){
        statusEl.textContent = errorMsg;
        statusEl.className = 'status error';
        statusEl.style.display = 'block';
        listEl.innerHTML = '';
        return;
      }
      var rows = (res.data || []).filter(function(s){ return fieldsMap[s.key]; });
      renderTextSettings(rows, fieldsMap, order, listEl, statusEl, emptyMsg);
    });
  }

  async function handleTextSettingSave(e){
    if (!e.target.classList.contains('site-content-save')) return;
    var card = e.target.closest('.category-edit');
    var statusEl = card.querySelector('.cat-status');
    var payload = {
      key: card.getAttribute('data-key'),
      text_value: card.querySelector('.site-content-value').value
    };
    e.target.disabled = true;
    statusEl.className = 'status cat-status';
    statusEl.style.display = 'block';
    statusEl.textContent = 'Saving…';
    try {
      var res = await fetch('/api/site-settings', {
        method: 'PUT',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(payload)
      });
      var data = await res.json();
      if (!res.ok) throw new Error((data && (data.error || data.message)) || 'Save failed');
      statusEl.textContent = 'Saved.';
      setTimeout(function(){ statusEl.style.display = 'none'; }, 1500);
    } catch (err){
      statusEl.className = 'status cat-status error';
      statusEl.textContent = err.message;
    } finally {
      e.target.disabled = false;
    }
  }

  var siteContentStatus = document.getElementById('site-content-status');
  var siteContentList = document.getElementById('site-content-list');
  siteContentList.addEventListener('click', handleTextSettingSave);

  function loadSiteContent(){
    loadTextSettings(SITE_CONTENT_FIELDS, SITE_CONTENT_ORDER, siteContentList, siteContentStatus,
      'No site content found.',
      'Site content columns not set up yet. Run supabase/site_content.sql in the Supabase SQL editor.');
  }

  var ctaContentStatus = document.getElementById('cta-content-status');
  var ctaContentList = document.getElementById('cta-content-list');
  ctaContentList.addEventListener('click', handleTextSettingSave);

  function loadCtaContent(){
    loadTextSettings(CTA_CONTENT_FIELDS, CTA_CONTENT_ORDER, ctaContentList, ctaContentStatus,
      'No contact section content found.',
      'Contact section content not set up yet. Run supabase/site_cta.sql in the Supabase SQL editor.');
  }

  // ---- Orders ----
  var ordersStatus = document.getElementById('orders-status');
  var ordersList = document.getElementById('orders-list');
  var STATUS_OPTIONS = ['pending', 'confirmed', 'shipped', 'delivered'];

  function orderRowHtml(o){
    var date = new Date(o.created_at).toLocaleString();
    var itemsHtml = (o.items || []).map(function(item){
      return '<div class="order-item-row">' + esc(item.name) + ' × ' + item.qty + ' — $' + (Number(item.price || 0) * item.qty).toFixed(2) + '</div>';
    }).join('');
    var addr = o.shipping_address || {};
    var addrText = [addr.line1, addr.line2, [addr.city, addr.state, addr.postal_code].filter(Boolean).join(', '), addr.country]
      .filter(Boolean).map(esc).join('<br>');
    var options = STATUS_OPTIONS.map(function(s){
      return '<option value="' + s + '"' + (s === o.status ? ' selected' : '') + '>' + s.charAt(0).toUpperCase() + s.slice(1) + '</option>';
    }).join('');
    return '' +
      '<div class="category-edit" data-id="' + o.id + '">' +
        '<h3>Order #' + o.id.slice(0, 8).toUpperCase() + ' — $' + Number(o.total || 0).toFixed(2) +
          '<span class="status-badge">' + (o.status || 'pending') + '</span></h3>' +
        '<div class="order-meta">' + esc(date) + ' · ' + esc(o.customer_name || '') + ' · ' + esc(o.customer_email || '') + (o.customer_phone ? ' · ' + esc(o.customer_phone) : '') + '</div>' +
        '<div>' + itemsHtml + '</div>' +
        '<div class="order-address"><strong>Ship to:</strong><br>' + addrText + '</div>' +
        '<div class="form-actions">' +
          '<select class="order-status-select">' + options + '</select>' +
          '<button type="button" class="btn btn-sm order-status-save">Update Status</button>' +
          '<p class="status cat-status"></p>' +
        '</div>' +
      '</div>';
  }

  function renderOrders(orders){
    if (!orders.length){
      ordersStatus.textContent = 'No orders yet.';
      ordersStatus.style.display = 'block';
      ordersList.innerHTML = '';
      return;
    }
    ordersStatus.style.display = 'none';
    ordersList.innerHTML = orders.map(orderRowHtml).join('');
  }

  function loadOrders(){
    fetch('/api/orders').then(function(res){ return res.json(); }).then(function(data){
      if (!Array.isArray(data)){
        ordersStatus.textContent = 'Unable to load orders.';
        ordersStatus.className = 'status error';
        ordersStatus.style.display = 'block';
        return;
      }
      renderOrders(data);
    }).catch(function(){
      ordersStatus.textContent = 'Unable to load orders.';
      ordersStatus.className = 'status error';
      ordersStatus.style.display = 'block';
    });
  }

  ordersList.addEventListener('click', async function(e){
    if (!e.target.classList.contains('order-status-save')) return;
    var card = e.target.closest('.category-edit');
    var statusEl = card.querySelector('.cat-status');
    var id = card.getAttribute('data-id');
    var status = card.querySelector('.order-status-select').value;
    e.target.disabled = true;
    statusEl.className = 'status cat-status';
    statusEl.style.display = 'block';
    statusEl.textContent = 'Saving…';
    try {
      var res = await fetch('/api/order-status', {
        method: 'PUT',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ id: id, status: status })
      });
      var data = await res.json();
      if (!res.ok) throw new Error((data && (data.error || data.message)) || 'Update failed');
      statusEl.textContent = 'Saved. Customer notified by email.';
      setTimeout(function(){ statusEl.style.display = 'none'; }, 2000);
      var badge = card.querySelector('.status-badge');
      if (badge) badge.textContent = status;
    } catch (err){
      statusEl.className = 'status cat-status error';
      statusEl.textContent = err.message;
    } finally {
      e.target.disabled = false;
    }
  });

  var shippingStatus = document.getElementById('shipping-status');
  var shippingForm = document.getElementById('shipping-form');
  var shippingInput = document.getElementById('shipping-rate-input');
  var shippingSaveBtn = document.getElementById('shipping-save');
  var shippingSaveStatus = document.getElementById('shipping-save-status');

  function loadShippingSettings(){
    client.from('site_settings').select('*').eq('key', 'shipping_rate').then(function(res){
      if (res.error || !res.data || !res.data.length){
        shippingStatus.textContent = 'Shipping rate not set up yet. Run supabase/site_shipping.sql in the Supabase SQL editor.';
        shippingStatus.className = 'status error';
        shippingStatus.style.display = 'block';
        shippingForm.style.display = 'none';
        return;
      }
      shippingStatus.style.display = 'none';
      shippingForm.style.display = '';
      shippingInput.value = res.data[0].number_value != null ? res.data[0].number_value : 0;
    });
  }

  shippingSaveBtn.addEventListener('click', function(){
    var value = Number(shippingInput.value);
    if (isNaN(value) || value < 0) value = 0;
    shippingSaveStatus.textContent = 'Saving…';
    shippingSaveStatus.className = 'status cat-status';
    shippingSaveStatus.style.display = '';
    fetch('/api/site-settings', {
      method: 'PUT',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ key: 'shipping_rate', number_value: value })
    }).then(function(res){ return res.json().then(function(data){ return { ok: res.ok, data: data }; }); })
      .then(function(result){
        if (!result.ok){
          shippingSaveStatus.textContent = 'Error saving shipping rate.';
          shippingSaveStatus.className = 'status error';
          return;
        }
        shippingInput.value = value;
        shippingSaveStatus.className = 'status cat-status';
        shippingSaveStatus.textContent = 'Saved.';
        shippingSaveStatus.style.display = '';
        setTimeout(function(){ shippingSaveStatus.style.display = 'none'; }, 1500);
      }).catch(function(){
        shippingSaveStatus.textContent = 'Error saving shipping rate.';
        shippingSaveStatus.className = 'status error';
      });
  });

  // Gate: confirm session, then load
  fetch('/api/admin-session').then(function(res){ return res.json(); }).then(function(data){
    if (!data.authenticated){
      window.location.href = '/admin/login.html';
      return;
    }
    var cfg = window.ETHEREAL_SUPABASE || {};
    if (!cfg.url || !cfg.anonKey){
      listStatus.textContent = 'Supabase is not configured yet.';
      listStatus.className = 'status error';
      return;
    }
    client = window.supabase.createClient(cfg.url, cfg.anonKey);
    loadProducts();
    loadCategories();
    loadSiteImages();
    loadSiteContent();
    loadCtaContent();
    loadShippingSettings();
    loadOrders();
    client
      .channel('orders-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, function(){
        loadOrders();
      })
      .subscribe();
  }).catch(function(){
    window.location.href = '/admin/login.html';
  });
})();
</script>
</body>
</html>
